<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon École - Résolveur</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #4a148c; padding: 10px; }
        
        /* Ecran de verrouillage */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #4a148c; display: flex; align-items: center; justify-content: center; z-index: 100000;
        }
        .lock-box { background: white; padding: 25px; border-radius: 12px; text-align: center; width: 90%; max-width: 350px; }
        
        /* Bouton WhatsApp */
        #whatsapp-btn {
            position: fixed; bottom: 15px; right: 15px;
            background: #25d366; color: white; padding: 12px 20px;
            border-radius: 30px; text-decoration: none; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 9999;
            display: none; font-size: 14px;
        }

        .container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5); max-width: 1100px; margin: auto; }
        .header { background: #6a1b9a; color: white; padding: 15px; text-align: center; }
        
        .toolbar { padding: 10px; background: #f3e5f5; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; border-bottom: 2px solid #ce93d8; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-img { background: #9c27b0; }
        .btn-pdf { background: #2e7d32; }
        .btn-del { background: #c62828; }

        /* Preview Image avec Zoom */
        #preview img { max-height: 50px; cursor: zoom-in; border-radius: 5px; border: 1px solid #ddd; }
        #preview img.full {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            max-height: 90vh; max-width: 95vw; z-index: 100001; cursor: zoom-out; box-shadow: 0 0 50px black;
        }

        .table-wrapper { width: 100%; overflow-x: auto; padding: 10px; background: #fff; }
        table { border-collapse: collapse; width: 100%; min-width: 900px; }
        th { background: #f5f5f5; border: 2px solid #ddd; padding: 12px; font-size: 1.1em; }
        td { border: 1px solid #ddd; padding: 15px; vertical-align: top; }

        .phrase-input { font-size: 1.3em; outline: none; min-height: 40px; border-bottom: 2px solid transparent; }
        .calc-input { width: 100%; padding: 12px; font-family: monospace; border: 2px solid #9c27b0; border-radius: 6px; margin-top: 10px; font-size: 1.3em; background: #f3e5f5; }
        .res-box { font-weight: bold; color: #4a148c; background: #f3e5f5; padding: 15px; border-radius: 8px; font-size: 1.5em; text-align: center; }
        .op-box { font-family: monospace; background: #fffde7; padding: 15px; border-radius: 5px; border: 1px solid #fff59d; font-size: 1.4em; text-align: right; }
        .line { border-bottom: 2px solid #333; margin: 5px 0; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-box">
        <h3>ACCÈS SÉCURISÉ</h3>
        <input type="number" id="access-code" placeholder="Code du jour" style="padding:12px; width:100%; margin:15px 0; text-align:center; font-size:1.2em;">
        <button class="btn btn-img" style="width:100%" onclick="checkCode()">ENTRER</button>
    </div>
</div>

<div class="container" id="app" style="display:none;">
    <div class="header">
        <h1>📐 Résolveur de Problèmes</h1>
    </div>

    <div class="toolbar">
        <input type="file" id="fileIn" style="display:none" accept="image/*">
        <button class="btn btn-img" onclick="document.getElementById('fileIn').click()">📁 Charger Image</button>
        <div id="preview"></div>
        <button class="btn btn-pdf" onclick="generatePDF()">📄 PDF</button>
        <button class="btn btn-del" onclick="clearAll()">🗑️ Effacer</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th style="width:45%">Solution (Raisonnement)</th>
                    <th style="width:25%">Résultat Final</th>
                    <th style="width:30%">Opération Posée</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<a href="https://wa.me/221777195288" id="whatsapp-btn" target="_blank">
    🟢 WhatsApp : 777195288
</a>

<script>
    function checkCode() {
        const today = new Date().getDate();
        const code = (today * 7) + 7;
        if (parseInt(document.getElementById('access-code').value) === code) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('whatsapp-btn').style.display = 'block';
            addRow();
        } else { alert("Code incorrect !"); }
    }

    document.getElementById('fileIn').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function() {
            const img = document.createElement('img');
            img.src = reader.result;
            img.onclick = function() { this.classList.toggle('full'); };
            const prev = document.getElementById('preview');
            prev.innerHTML = '';
            prev.appendChild(img);
        }
        reader.readAsDataURL(e.target.files[0]);
    };

    function addRow() {
        const body = document.getElementById('tableBody');
        const row = body.insertRow();
        row.innerHTML = `
            <td>
                <div class="phrase-input" contenteditable="true" onkeydown="handleKey(event, this)"></div>
                <div class="calc-area"></div>
            </td>
            <td class="res-cell"></td>
            <td class="op-cell"></td>
        `;
        setTimeout(() => row.querySelector('.phrase-input').focus(), 10);
    }

    function handleKey(e, el) {
        if (e.key === 'Enter') { e.preventDefault(); createCalc(el.parentElement); }
        else if (e.key === '=') { e.preventDefault(); addRow(); }
    }

    function createCalc(container) {
        if (container.querySelector('.calc-input')) return;
        const input = document.createElement('input');
        input.className = 'calc-input';
        input.placeholder = "Calcul...";
        input.oninput = function() { runMath(this); };
        input.onkeydown = function(e) { if(e.key === 'Enter' || e.key === '=') { e.preventDefault(); addRow(); } };
        container.querySelector('.calc-area').appendChild(input);
        input.focus();
    }

    function runMath(input) {
        const row = input.closest('tr');
        let val = input.value.trim();
        if(!val) return;

        let unit = (val.match(/[a-zA-Z€$]+[0-9]*/) || [""])[0];
        let clean = val.replace(/,/g, '.').replace(/×/g, '*').replace(/x/g, '*').replace(/÷/g, '/').replace(/:/g, '/').replace(/[^0-9\+\-\*\/\(\)\.]/g, '');

        try {
            let result = eval(clean);
            if (result !== undefined) {
                let disp = (Number.isInteger(result) ? result : result.toFixed(2)).toString().replace('.', ',');
                row.cells[1].innerHTML = `<div class="res-box">${disp} ${unit}</div>`;
                
                const simpleRegex = /^(\d+\.?\d*)([\+\-\*\/])(\d+\.?\d*)$/;
                const isSimple = clean.match(simpleRegex);
                if (isSimple) {
                    let n1 = isSimple[1].replace('.', ',');
                    let sign = isSimple[2].replace('*','×').replace('/','÷');
                    let n2 = isSimple[3].replace('.', ',');
                    row.cells[2].innerHTML = `<div class="op-box"><div>${n1}</div><div class="line">${sign} ${n2}</div><div>${disp}</div></div>`;
                } else {
                    row.cells[2].innerHTML = `<div class="op-box" style="text-align:center;"><b>${disp} ${unit}</b></div>`;
                }
            }
        } catch (err) {}
    }

    function generatePDF() { html2pdf().from(document.getElementById('app')).save(); }
    function clearAll() { if(confirm("Effacer tout ?")) location.reload(); }
</script>

</body>
</html>
